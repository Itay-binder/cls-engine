<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLS ENGINE — מפת קריאייטיב 125</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070A12;--surface:#0D1526;--surface2:#101624;--border:#1e2d45;
  --text:#F8FAFC;--dim:#94A3B8;--muted:#64748B;
  --purple:#8B5CF6;--purple-bg:#7c3aed20;
  --cyan:#38BDF8;--cyan-bg:#38bdf820;
  --green:#22C55E;--green-bg:#22c55e20;
  --amber:#F59E0B;--amber-bg:#f59e0b20;
  --red:#EF4444;--red-bg:#ef444420;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.5;direction:rtl}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px}

/* Header */
.header{border-bottom:1px solid var(--border);padding:32px 0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#7C3AED,#38BDF8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.header h1{font-size:22px;font-weight:700}
.header-sub{font-size:13px;color:var(--muted);margin-top:2px}
.badge-125{background:linear-gradient(135deg,var(--purple-bg),var(--cyan-bg));border:1px solid var(--purple);border-radius:12px;padding:8px 20px;text-align:center;flex-shrink:0}
.badge-125 .num{font-size:36px;font-weight:900;color:var(--purple);line-height:1}
.badge-125 .lbl{font-size:11px;color:var(--muted)}

/* Equation */
.eq-section{padding:40px 0}
.equation{display:flex;align-items:stretch;flex-wrap:wrap;gap:0}
.eq-box{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:0;padding:24px 20px}
.eq-box:first-child{border-radius:16px 0 0 16px}
.eq-box+.eq-box{border-right:none}
.eq-result{flex:0 0 150px;background:linear-gradient(135deg,var(--purple-bg),var(--cyan-bg));border-color:var(--purple)!important;border-radius:0 16px 16px 0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.eq-operator{display:flex;align-items:center;padding:0 10px;color:var(--muted);font-size:26px;flex-shrink:0}
.eq-count{font-size:38px;font-weight:900;line-height:1;margin-bottom:4px}
.eq-label{font-size:12px;color:var(--muted);margin-bottom:14px}
.eq-items{display:flex;flex-direction:column;gap:5px}
.eq-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim)}
.eq-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.result-num{font-size:52px;font-weight:900;color:var(--purple);line-height:1}
.result-lbl{font-size:12px;color:var(--muted);margin-top:6px}

/* Section title */
.sec-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.sec-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{border-color:var(--purple);color:var(--text)}
.tab.active{font-weight:600;color:var(--text)}

/* Matrix */
.matrix-section{padding:0 0 48px}
.matrix-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
.mtable{width:100%;border-collapse:collapse;min-width:800px}
.mtable th{background:var(--surface2);padding:12px 14px;font-size:11px;font-weight:600;text-align:right;border-bottom:1px solid var(--border);color:var(--dim);white-space:nowrap}
.mtable th.angle-h{width:130px;background:var(--surface)}
.av-th{text-align:center!important;min-width:175px}
.av-th .avi{font-size:17px;display:block;margin-bottom:2px}
.av-th .avn{font-size:11px;color:var(--dim)}
.mtable td{padding:0;border-bottom:1px solid var(--border);vertical-align:top}
.angle-td{padding:14px;background:var(--surface);border-left:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.angle-lbl{display:flex;align-items:center;gap:7px}
.angle-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.angle-name{font-size:11px;font-weight:600}
.angle-id{font-size:10px;color:var(--muted)}
.cc{padding:11px 13px;cursor:pointer;transition:background .12s;border-left:1px solid var(--border);height:100%}
.cc:hover{background:#141d2e}
.cc:last-child{border-left:none}
.cc-id{font-size:9px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:.04em;margin-bottom:5px;opacity:.55}
.cc-hook{font-size:11px;line-height:1.5;color:var(--dim);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cc-note{font-size:10px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}

/* Grid */
.grid-section{padding:0 0 64px}
.filter-wrap{margin-bottom:20px}
.frow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.flabel{font-size:11px;color:var(--muted);min-width:48px;flex-shrink:0}
.chip{padding:5px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{color:var(--dim);border-color:var(--muted)}
.chip.active{color:var(--text);font-weight:600;border-color:currentColor}
.grid-count{font-size:13px;color:var(--muted);margin-bottom:18px}
.grid-count strong{color:var(--text)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:11px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:15px;cursor:pointer;transition:border-color .15s,background .15s}
.card:hover{border-color:var(--purple);background:var(--surface2)}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid transparent;letter-spacing:.02em}
.card-id{font-size:9px;font-weight:700;font-family:'Courier New',monospace;color:var(--muted);letter-spacing:.04em;margin-bottom:7px}
.card-hook{font-size:12px;line-height:1.6;color:var(--dim);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-note{font-size:10px;color:var(--muted);margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(7,10,18,.88);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s;overflow-y:auto}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#0D1526;border:1px solid var(--border);border-radius:16px;width:100%;max-width:620px;padding:28px;transform:translateY(10px);transition:transform .15s}
.modal-overlay.open .modal{transform:translateY(0)}
.mhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.mid{font-size:11px;font-weight:700;font-family:'Courier New',monospace;color:var(--muted);letter-spacing:.05em}
.mclose{width:28px;height:28px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.mclose:hover{background:var(--border);color:var(--text)}
.mbadges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.mbadge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid transparent}
.msec{margin-bottom:22px}
.msec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:10px}
.mhook{font-size:17px;font-weight:700;line-height:1.5;color:var(--text)}

/* Copy button */
.copy-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-size:12px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.copy-btn:hover{border-color:var(--purple);color:var(--purple)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}

/* Carousel slides */
.slides{display:flex;flex-direction:column;gap:8px}
.slide{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px}
.slide-num{font-size:9px;font-weight:700;font-family:'Courier New',monospace;color:var(--muted);margin-bottom:6px;letter-spacing:.06em}
.slide-headline{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px}
.slide-body{font-size:12px;color:var(--dim);line-height:1.6;white-space:pre-line}
.slide-visual{font-size:10px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}

/* Script */
.script-block{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:12px;line-height:1.8;color:var(--dim);white-space:pre-line;direction:rtl}
.script-ts{color:var(--purple);font-weight:700;font-size:11px}

/* Image prompt */
.prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;line-height:1.7;color:var(--dim);direction:ltr;text-align:left}

/* AI image copy section */
.image-copy{margin-bottom:14px}
.image-copy .copy-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.image-copy .copy-value{font-size:14px;color:var(--dim);margin-bottom:8px;line-height:1.5}

/* CTA footer */
.mcta{margin-top:20px;background:var(--purple-bg);border:1px solid var(--purple);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--purple);font-weight:600}

footer{border-top:1px solid var(--border);padding:20px 0;text-align:center;color:var(--muted);font-size:12px;margin-top:16px}
</style>
</head>
<body>
<div class="wrap">

</div>

/* ── BUILD CREATIVES ── */
function build(){
  const all=[];
  for(const f of FMT) for(const a of ANG) for(const av of AV)
    all.push({id:`CLS-${f.code}-${a.id}-${av.id}-V1`,format:f,angle:a,avatar:av,hook:HOOKS[a.id+'-'+av.id]});
  return all;
}
const ALL=build();

/* ── EQUATION ── */
function buildEq(){
  document.getElementById('eq-angles').innerHTML=`
    <div class="eq-count" style="color:#8B5CF6">5</div>
    <div class="eq-label">זוויות</div>
    <div class="eq-items">${ANG.map(a=>`<div class="eq-item"><span class="eq-dot" style="background:${a.color}"></span>${a.short}</div>`).join('')}</div>`;
  document.getElementById('eq-avatars').innerHTML=`
    <div class="eq-count" style="color:#38BDF8">5</div>
    <div class="eq-label">אווטארים</div>
    <div class="eq-items">${AV.map(a=>`<div class="eq-item"><span style="font-size:13px">${a.icon}</span>${a.short}</div>`).join('')}</div>`;
  document.getElementById('eq-formats').innerHTML=`
    <div class="eq-count" style="color:#22C55E">5</div>
    <div class="eq-label">פורמטים</div>
    <div class="eq-items">${FMT.map(f=>`<div class="eq-item"><span class="eq-dot" style="background:${f.color}"></span>${f.name}</div>`).join('')}</div>`;
}

/* ── MATRIX ── */
let activeFmt='F1';
function buildTabs(){
  document.getElementById('format-tabs').innerHTML=FMT.map(f=>`
    <button class="tab ${f.id===activeFmt?'active':''}"
      style="${f.id===activeFmt?`color:${f.color};border-color:${f.color};background:${f.bg}`:''}"
      onclick="selFmt('${f.id}')">${f.name}</button>`).join('');
}
function selFmt(id){activeFmt=id;buildTabs();buildMatrix();}
function buildMatrix(){
  const fmt=FMT.find(f=>f.id===activeFmt);
  let h=`<thead><tr><th class="angle-h">זווית \\ אווטאר</th>
    ${AV.map(av=>`<th class="av-th"><span class="avi">${av.icon}</span><span class="avn">${av.short}</span></th>`).join('')}
    </tr></thead><tbody>`;
  for(const ang of ANG){
    h+=`<tr><td class="angle-td"><div class="angle-lbl">
      <span class="angle-dot" style="background:${ang.color}"></span>
      <div><div class="angle-name" style="color:${ang.color}">${ang.short}</div>
      <div class="angle-id">${ang.id}</div></div></div></td>`;
    for(const av of AV){
      const c=ALL.find(x=>x.format.id===activeFmt&&x.angle.id===ang.id&&x.avatar.id===av.id);
      h+=`<td><div class="cc" onclick="openModal('${c.id}')">
        <div class="cc-id" style="color:${fmt.color}">${c.id}</div>
        <div class="cc-hook">${c.hook}</div>
        <div class="cc-note">${fmt.desc}</div>
      </div></td>`;
    }
    h+=`</tr>`;
  }
  document.getElementById('matrix-table').innerHTML=h+'</tbody>';
}

/* ── GRID ── */
let fA='all',fB='all',fC='all';
function buildFilters(){
  const mk=(el,items,type,color)=>{
    el.innerHTML=`<button class="chip active" style="color:var(--text);border-color:var(--dim)" data-v="all" onclick="sf('${type}','all')">הכל</button>`
      +items.map(i=>`<button class="chip" data-v="${i.id}" onclick="sf('${type}','${i.id}')">${i.icon||''}${i.short}</button>`).join('');
    el.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
  };
  mk(document.getElementById('fa'),ANG,'A');
  mk(document.getElementById('fb'),AV,'B');
  mk(document.getElementById('fc'),FMT,'C');
}
function sf(type,val){
  if(type==='A')fA=val;
  if(type==='B')fB=val;
  if(type==='C')fC=val;
  const map={A:ANG,B:AV,C:FMT};
  document.querySelectorAll(`[data-v]`).forEach(ch=>{
    // reset all same-type chips
  });
  const elId={A:'fa',B:'fb',C:'fc'};
  document.querySelectorAll(`#${elId[type]} .chip`).forEach(ch=>{
    const active=ch.dataset.v===val;
    ch.classList.toggle('active',active);
    if(active){
      let col='var(--text)',bc='var(--dim)';
      if(type==='A'&&val!=='all'){const a=ANG.find(x=>x.id===val);col=a.color;bc=a.color;}
      if(type==='C'&&val!=='all'){const f=FMT.find(x=>x.id===val);col=f.color;bc=f.color;}
      ch.style.color=col;ch.style.borderColor=bc;
    }else{ch.style.color='';ch.style.borderColor='';}
  });
  buildGrid();
}
function buildGrid(){
  const filtered=ALL.filter(c=>{
    if(fA!=='all'&&c.angle.id!==fA)return false;
    if(fB!=='all'&&c.avatar.id!==fB)return false;
    if(fC!=='all'&&c.format.id!==fC)return false;
    return true;
  });
  document.getElementById('gc').innerHTML=`מציג <strong>${filtered.length}</strong> מתוך <strong>125</strong> קריאייטיבים`;
  document.getElementById('cg').innerHTML=filtered.map(c=>`
    <div class="card" onclick="openModal('${c.id}')">
      <div class="card-id">${c.id}</div>
      <div class="card-badges">
        <span class="badge" style="color:${c.format.color};background:${c.format.bg};border-color:${c.format.color}40">${c.format.name}</span>
        <span class="badge" style="color:${c.angle.color};background:${c.angle.bg};border-color:${c.angle.color}40">${c.angle.short}</span>
        <span class="badge" style="color:var(--dim);background:#1e2d4530;border-color:var(--border)">${c.avatar.icon} ${c.avatar.short}</span>
      </div>
      <div class="card-hook">${c.hook}</div>
      <div class="card-note">${c.format.desc}</div>
    </div>`).join('');
}

/* ── MODAL ── */
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓ הועתק!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=btn.dataset.orig;btn.classList.remove('copied');},2000);
  });
}

  } else if(f.id==='F4'){
    const script=podcastScript(a,av);
    body=`<div class="msec">

function openModal(id){
  const c=ALL.find(x=>x.id===id);if(!c)return;
  document.getElementById('mc').innerHTML=`
    <div class="mhead">
      <div><div class="mid">${c.id}</div></div>
      <button class="mclose" onclick="document.getElementById('mo').classList.remove('open')">✕</button>

    <div class="msec">
      <div class="msec-title">הוק</div>
      <div class="mhook">${c.hook}</div>
    </div>
    <div class="msec">
      <div class="msec-title">כאב האווטאר</div>
      <div style="font-size:13px;color:var(--dim)">${c.avatar.pain}</div>

    <div class="mcta">CTA: "התחילו עכשיו — 7 ימים חינם, בלי כרטיס אשראי"</div>`;
  document.getElementById('mo').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('mo'))document.getElementById('mo').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('mo').classList.remove('open');});

/* ── INIT ── */
buildEq();buildTabs();buildMatrix();buildFilters();buildGrid();
